<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>탐라국 입춘굿</title>
  <style>
    
    #container {
      width: 600px; /* 너비 600픽셀 */
      margin: 20px auto;  /* 위/아래 여백 20픽셀 내용이 화면 중앙에 오도록 지정 */
    }

    h1 {
      display: inline-block;  /* 블록 레벨 요소를 인라인 레벨 요소로 바꾼 후 글자 부분에만 배경색이 채워지도록 지정 */
      background-color: #0404aa;  /* 배경색 - 짙은 파란색 */
      color: #fff;  /* 글자색 - 흰색 */
    }

    .class {
      font-weight: bold;  /* 글자 굵게 */
      color: red; /* 글자색 - 빨간색 */
    }
    
  </style>
</head>
<body>
  <div id="container">
    <h1>탐라국 입춘굿</h1>    
    <p>제주도의 문화축제 중에서 유일하게 <span class="accent">탐라 시대부터 내려온 축제</span>이다.</p>
    <p>제주에서 입춘은 새철<sup>(제주어, 샛절)</sup> 드는 날이라 한다. <br>
      하늘의 1만8,000 신이 지상으로 내려와 새해 일들을 시작하는 때다.
    </p>
  </div>
</body>
</html>
