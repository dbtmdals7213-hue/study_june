<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <title>연습문제 2</title>
    <style>
			.container {
        width:300px;
        height:70px;     
        margin:0 auto;
        background-color:#444;        
      }    
      h1 {
        text-align: center;
        line-height: 70px;
        color: white;   /* 글자 색을 흰색(white, #fff)으로 설정 */
        text-shadow: 3px 2px 5px#000;   /* 텍스트를 기준으로 오른쪽 아래, 가로 거리 3px, 세로 거리 2px 되는 위치에 5px 정도 번지는
                                              그림자 효과를 추가. 그림자 색은 검정(black, #000)으로 설정 */
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>웹 개발 기초</h1>
    </div>
  </body>
</html>
