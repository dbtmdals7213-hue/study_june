<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>연습문제 4</title>
	<style>
		#container { 
			width:650px;  
			margin:0 auto;  
			padding:5px;		
		}
		#check {   
			width:640px; 
			border:1px solid #ccc;  
		}		
		h1 {
			color: white; 
			font-size: 1em; 
			background: #222; 
			margin: 0; 
			padding: 10px; 
		}		

		h2 {
			color: #ff0000;	/* <h2> 요소의 글자 색을 #ff0000으로 설정. */
			font-size: 1.5em;	/* <h2> 요소의 글자 크기를 1.5em으로 설정. */
			text-align: center;	/* <h2> 요소의 글자를 가운데로 정렬. */
		}

		p{
			font-size: 1.2em;	/* <p> 요소의 글자 크기를 1.2em으로 설정.  */
			line-height: 2em;	/* <p> 요소의 줄 간격을 2.0em으로 설정. */
			font-weight: bold;	/* <p> 요소의 글자 굵기를 굵은 글자로 설정. */
			text-align: center;	/* <p> 요소의 텍스트를 가운데로 정렬. */
		}

		.accent {
			color: #0000ff;	/* 이름이 accent인 클래스 스타일을 글자색 #0000ff로 설정. */
		}

		.smalltext {
			font-size: 0.7em;	/* 이름이 smalltext인 클래스 스타일을 글자 크기 0.7em로 설정. */
		}

	</style>
</head>

<body>
	<div id="container">
		<img src="images/top.jpg" alt="가정용 꿀사과 - 흠집이 있고 약간은 못생겼지만 맛과 영양은 그대로입니다. 질좋은 사과를 저렴하게 즐겨보세요">		
		<div id="check">
			<h1>확인하세요</h1>
			<h2>주문 및 배송</h2>
			<p><span class="accent">오후 2시 이전</span> 주문건은 당일 발송합니다<br>	<!-- <span> 태그로 묶은 '오후 2시 이전'에 class="accent" 클래스 스타일 적용. -->
			2시 이후 주문건은 다음날 발송합니다(주말 제외)</p>
			<hr>
			<h2>교환 및 환불</h2>
			<p>불만족시 <span class="accent">100% 환불</span>해 드립니다<br>	<!-- <span> 태그로 묶은 '100% 환불'에 class="accent" 클래스 스타일 적용. -->
			고객센터로 전화주세요</p>
			<hr>
			<h2>고객센터 </h2>
			<p>0000-0000<br>
			<span class="smalltext">상담시간 : 오전 9시 ~ 오후 6시 (토/일, 공휴일 휴무)</span></p>		<!-- <span> 태그로 묶은 '상담시간 : 오전 9시 ~ 오후 6시 (토/일, 공휴일 휴무)'에
																										 class="smalltext" 클래스 스타일 적용. -->
		</div>
	</div>
</body>
</html>
