<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>연습문제 1</title>
	<style>	
		#container {
			width:350px;
			margin:30px auto;
		}
		img {
			border: 1px solid #ccc;	/* img 요소의 테두리에 1px짜리 #ccc 실선 설정. */
			border-radius: 50%;		/* img 요소의 이미지 테두리를 원형으로 설정. */
			box-shadow: 5px 5px 30px 2px #000;		/* img 요소의 이미지 주변에 그림자 효과를 추가( 가로/세로 5px, 흐림 정도 30px, 번짐 정도 2px, 그림자 색상 #000) */
		}
	</style>
</head>
<body>
<div id="container">
	<img src="images/bear.jpg" alt="곰인형 사진">
</div>
</body>
</html>
