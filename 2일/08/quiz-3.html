<!DOCTYPE html>
<html lang="ko">
	<head>
		<meta charset="UTF-8">
		<title>연습문제 3</title>
		<style>
			a:link, a:visited {
				color:black;
				text-decoration: none;
			}
			a:hover {
				background-color:#000;
				color:#fff;
			}

			ul {
				list-style: none;		/* ul 요소의 불릿 제거. */
			}

			li {
				float: left;		/* li 요소를 왼쪽으로 정렬하도록 설정. */
			}
			a {
				display: block;		/* a 요소의 display 속성을 block으로 설정. */
				padding: 10px 20px;		/* a 요소의 패딩을 위/아래 10px, 좌/우 20px로 설정. */
				background-color: #ccc;	/* a 요소의 배경색을 #ccc로 설정. */
			}

		</style>
	</head>
	<body>
		<nav>
			<ul>
				<li><a href="#">메뉴1</a></li>
				<li><a href="#">메뉴2</a></li>
				<li><a href="#">메뉴3</a></li>
				<li><a href="#">메뉴4</a></li>
			</ul>
		</nav>
	</body>
</html>
