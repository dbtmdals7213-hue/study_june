<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>연습문제 1</title>  
  <style>
    img {
      margin-right:50px;
      border:1px solid #ccc;
      box-shadow: 2px 2px 5px #ccc;
    }
    img :first-of-type {    /* 가상 클래스 first-of-type을 사용하여 첫 번째 이미지 css 설정. */
      border: 2px solid #f00;   /* 첫 번째 이미지의 테두리를 두께 2px, 실선, #f00색상으로 설정. */
    }
  </style>
</head>
<body>
  <img src="images/1.jpg" alt="">
  <img src="images/2.jpg" alt="">
  <img src="images/3.jpg" alt="">
</body>
</html>
